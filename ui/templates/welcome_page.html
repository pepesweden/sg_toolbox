<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Toolbox | Salesgroup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container py-5">
        <!-- Hem
        knapp -->
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo/white.png') }}" alt="Logotyp" height="80">
        </div>
        <!-- Navigation: user info, logout, and change-password links -->
        <div class="text-center mb-4">
            <span class="text-light me-3">Inloggad som: {{ current_user.username }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logga ut</a>
            <!-- Link to the change-password page, shown below the logout button -->
            <a href="{{ url_for('change_password') }}" class="btn btn-outline-light btn-sm ms-2">Byt lösenord</a>
        </div>
        <div class="row justify-content-center">
            <!--<h1 class="text-center text-light mb-5"> | Toolbox |</h1>-->
            <!--
            <div class="col-md-4 mb-4">
                <div class="module-blurb shadow-lg h-100">
                    <div class="blurb-icon-container text-center pt-3">
                        <span class="svg-icon-fa icon">📄</span>
                    </div>
                    <div class="blurb-content-wrapper p-3">
                        <h2 class="blurb-heading h4">Säljverktyg</h2>
                        <p class="small">T.ex. skapa offert</p>
                        <p class="small"><a href="/generate-offer" class="btn btn-outline-light mt-2">Starta</a></p>
                    </div>
                </div>
            </div>    
            -->
            <div class="col-md-4 mb-4">
                <div class="module-blurb shadow-lg h-100">
                    <div class="blurb-icon-container text-center pt-3">
                        <span class="svg-icon-fa icon">📝</span>
                    </div>
                    <div class="blurb-content-wrapper p-3">
                        <h2 class="blurb-heading h4">Leveransverktyg</h2>
                        <p class="small">Generera dokument för Leverans</p>
                        <p class="small"><a href="/generate-summary" class="btn btn-outline-light mt-2">Starta</a></p>
                    </div>
                </div>
            </div>
            {% if current_user.is_admin %}
            <div class="col-md-4 mb-4">
                <div class="module-blurb shadow-lg h-100">
                    <div class="blurb-icon-container text-center pt-3">
                        <span class="svg-icon-fa icon">⚙️</span>
                    </div>
                    <div class="blurb-content-wrapper p-3">
                        <h2 class="blurb-heading h4">Adminverktyg</h2>
                        <p class="small">hantera användare i toolbox</p>
                        <p class="small"><a href="/admin-page" class="btn btn-outline-light mt-2">Starta</a></p>
                    </div>
                </div>
            </div>
            {% endif %}
            <!--
            <div class="col-md-4 mb-4">
                <div class="module-blurb shadow-lg h-100">
                    <div class="blurb-icon-container text-center pt-3">
                        <span class="svg-icon-fa icon">🔍</span>
                    </div>
                    <div class="blurb-content-wrapper p-3">
                        <h2 class="blurb-heading h4">Admin</h2>
                        <p class="small">Administrera Toolbox.</p>
                        <p class="small"><a href="/generate-seo" class="btn btn-outline-light mt-2">Starta</a></p>
                    </div>
                </div>
            </div>
            -->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
